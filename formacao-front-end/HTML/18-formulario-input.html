<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário input</title>
</head>
<body>

    <form action="" method="POST">

       <fieldset>
        <legend>Formulário</legend>

        <label for="">Telefone</label>
        <input type="tel" placeholder="Digite seu telefone 11 99999-9999">

        <input type="text" placeholder="Texto">

        <input type="email" placeholder="Email">

        <label for="">Sua foto</label>
        <input type="file">

        <input type="checkbox" name="" id="">

        <input type="radio">

        <input type="color">

        <input type="range">

        <input type="date">
        <input type="datetime-local">
        <input type="time">
        <input type="week">
        <input type="month">
        <input type="hidden" value="">
        <input type="number" placeholder="somente numero">
        <input type="search">
        <input type="text" value="111.111.111-11" disabled>

  
        <select name="select">
            <option value="">selecione uma opção</option>
            <option value="1">Carro vermelho</option>
            <option value="2">item 2</option>
            <option value="3">item 3</option>
        </select>

      

        <textarea name="" id=""></textarea>

        <input type="submit" value="enviar">
        <input type="reset" value="limpar">

       </fieldset>

    </form>
    
</body>
</html>
