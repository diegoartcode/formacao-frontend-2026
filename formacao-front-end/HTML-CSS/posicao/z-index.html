<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position z-index</title>
    <style>

       .box1{
        background-color: red;
        position: absolute;
        top:100px;
        left: 100px;
        z-index: 1;
       }
       .box2{
        background-color: blue;
         position: absolute;
         top:130px;
        left: 130px;
         z-index: 2;
       }
       .box3{
        background-color: brown;
         position: absolute;
         top:160px;
        left: 160px;
       }
    </style>
</head>

<body>
    <main>
        <div class="box1">
            <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit.</p>
        </div>
        <div class="box2">
             <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit.</p>
        </div>
        <div class="box3">
            <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit.</p>
        </div>
    </main>
    

</body>

</html>
