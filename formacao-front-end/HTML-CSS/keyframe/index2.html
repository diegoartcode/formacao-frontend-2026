<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyframe</title>
    <style>
        div{
            width: 100px;
            height: 100px;
            background-color: blueviolet;
            position: relative;
            animation: animacao 5s infinite;
        }

        @keyframes animacao {
            from{
                top:0px;
                left: 0px;
                transform: rotate(10deg);
            }
            to{
                top:200px;
                left: 200px;
                transform: rotate(80deg);
            }
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
