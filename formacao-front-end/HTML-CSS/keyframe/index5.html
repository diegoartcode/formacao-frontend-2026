<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyframe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: aqua;
        }

        .pulse-animation {
            width: 52px;
            height: 52px;
            border-radius: 100%;
            margin: 50px;
            border: 4px solid #ff8717;
            animation: none;
        }

        .pulse-animation:hover {


            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            10% {
                box-shadow: 0 0 0 0 rgba(204, 169, 44, 0.4);
            }

            70% {
                box-shadow: 0 0 0 30px rgba(204, 169, 44, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(204, 169, 44, 0);
            }
        }
    </style>
</head>

<body>
    <img class="pulse-animation" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="">
    <img class="pulse-animation" src="https://randomuser.me/api/portraits/lego/2.jpg" alt="">
</body>

</html>
